<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PeakSeek</title>
<link rel="stylesheet" href="./styles.css" />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div class="app">
<header class="top">
<h1>PeakSeek</h1>
<span class="badge">v0.2.0 App-First</span>
</header>

<section class="card">
<h2>Live Status</h2>
<div id="statusPanel" class="mono">Loading...</div>
<div class="row">
<button id="refreshBtn">Refresh</button>
<button id="semiOnBtn">Semi ON</button>
<button id="semiOffBtn" class="danger">Semi OFF</button>
</div>
</section>

<section class="card">
<h2>Trial Controls</h2>
<div class="row">
<button id="trialStartBtn">Start Trial</button>
<button id="trialStopBtn">Stop Trial</button>
</div>
<p class="hint">Use trial mode to validate strategy before real money.</p>
</section>

<section class="card">
<h2>Wallet Setup</h2>
<label>EVM Wallet</label>
<input id="evm" placeholder="0x..." />
<label>Solana Wallet</label>
<input id="sol" placeholder="SoL..." />
</section>

<section class="card">
<h2>Mode & Budgets</h2>
<div class="row">
<button class="chip" data-mode="manual">Manual</button>
<button class="chip" data-mode="semi">Semi</button>
<button class="chip danger" data-mode="full">Full</button>
</div>
<p id="modeText" class="hint">Selected: manual</p>

<div class="grid">
<label>ETH <input id="b_eth" type="number" min="0" value="0" /></label>
<label>BASE <input id="b_base" type="number" min="0" value="0" /></label>
<label>BNB <input id="b_bnb" type="number" min="0" value="0" /></label>
<label>ARB <input id="b_arb" type="number" min="0" value="0" /></label>
<label>SOL <input id="b_sol" type="number" min="0" value="0" /></label>
</div>

<div class="row">
<button id="saveBtn" class="primary">Save All</button>
</div>
<p id="status" class="hint">Ready.</p>
</section>
</div>

<script src="./app.js"></script>
</body>
</html>
